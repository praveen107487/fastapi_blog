<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        {% if title %}
            <title>FastAPI Blog - {{ title }}</title>
        {% else %}
            <title>FastAPI Blog</title>
        {% endif %}
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', path='css/main.css') }}">
        <meta name="theme-color" content="#527c9f">
    </head>
    <body class="d-flex flex-column min-vh-100">
        <header class="site-header">
            <nav class="navbar navbar-expand-md bg-steel fixed-top" data-bs-theme="dark">
                <div class="container">
                    <a class="navbar-brand me-4" href="{{ url_for('home') }}">FastAPI Blog</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarToggle" aria-controls="navbarToggle" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarToggle">
                        <div class="navbar-nav me-auto">
                            <a class="nav-link active" aria-current="page" href="{{ url_for('home') }}">Home</a>
                        </div>
                        <div class="navbar-nav">
                            <div id="loggedOutNav" class="d-flex">
                                <a class="btn btn-outline-light mb-2 mb-md-0 me-md-2" href="/login">Login</a>
                                <a class="btn btn-light mb-2 mb-md-0 me-md-3" href="/register">Register</a>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>
        </header>

        <main role="main" class="container">
            <div class="row">
                <div class="col-md-8">
                    {% block content %}{% endblock content %}
                </div>
                <aside class="col-md-4">
                    <div class="content-section py-3 px-4 mb-4">
                        <h3>Our Sidebar</h3>
                        <p class="text-body-secondary">Information board.</p>
                    </div>
                </aside>
            </div>
        </main>

        <footer class="mt-auto py-3 bg-body-tertiary border-top">
            <div class="container text-center">
                <p class="text-body-secondary mb-0">© <span id="year"></span> Corey Schafer</p>
            </div>
        </footer>

        <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        {% block scripts %}{% endblock scripts %}
    </body>
</html>
