<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    {% if title %}
        <title>FastAPI Blog - {{ title }}</title>
    {% else %}
        <title>FastAPI Blog</title>
    {% endif %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          type="text/css"
          href="{{ url_for('static', path='css/main.css') }}">

</head>

<body>

<header class="site-header">

    <nav class="navbar navbar-expand-md bg-steel fixed-top navbar-dark">

        <div class="container">

            <a class="navbar-brand me-4"
               href="/">
                FastAPI Blog
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarToggle">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
                 id="navbarToggle">

                <div class="navbar-nav me-auto">

                    <a class="nav-item nav-link active"
                       href="/">
                        Home
                    </a>

                </div>

            </div>

        </div>

    </nav>

</header>

<main role="main"
      class="container">

    <div class="row">

        <div class="col-md-8">

            {% block content %}
            {% endblock content %}

        </div>

        <div class="col-md-4">

            <div class="content-section py-3 px-4 mb-4">

                <h3>Sidebar</h3>

                <p class="text-body-secondary">
                    Simple FastAPI Blog Project
                </p>

            </div>

        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
