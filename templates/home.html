{% extends "layout.html" %}

{% block content %}
    <div id="postsContainer">
        {% for post in posts %}
            <article class="content-section py-3 px-4 mb-4">
                <div class="d-flex align-items-start gap-4">
                    <img class="rounded-circle article-img flex-shrink-0"
                         src="{{ post.author.image_path if post.author.image_path else url_for('static', path='profile_pics/default.jpg') }}"
                         alt="Profile Picture" width="64" height="64">
                    <div class="flex-grow-1">
                        <div class="article-metadata mb-2">
                            <a class="me-2" href="/users/{{ post.author.id }}/posts">{{ post.author.username }}</a>
                            <small class="text-body-secondary">{{ post.date_posted }}</small>
                        </div>
                        <h2>
                            <a class="article-title" href="/posts/{{ post.id }}">{{ post.title }}</a>
                        </h2>
                        <p class="article-content">{{ post.content }}</p>
                    </div>
                </div>
            </article>
        {% endfor %}
    </div>
{% endblock content %}
