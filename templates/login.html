{% extends "layout.html" %}
{% block content %}
    <div class="content-section py-3 px-4 mb-4">
        <h2 class="mb-4">Login</h2>
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password"
                       class="form-control"
                       id="password"
                       name="password"
                       required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <div class="mt-3">
            <p class="mb-0">
                Don't have an account? <a href="{{ url_for('register_page') }}">Register here</a>
            </p>
        </div>
    </div>
{% endblock content %}
{% block scripts %}
    <script type="module">
      const showModalSafe = (modalId) => {
          const el = document.getElementById(modalId);
          if (el) {
              const modal = new bootstrap.Modal(el);
              modal.show();
          }
      };

      const getErrorSafe = (errorObj) => {
          if (typeof errorObj.detail === 'string') return errorObj.detail;
          if (Array.isArray(errorObj.detail)) return errorObj.detail[0]?.msg || "Validation error";
          return "An unexpected server error occurred.";
      };

      const loginForm = document.getElementById('loginForm');

      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const formData = new FormData(loginForm);

        try {
          const response = await fetch('/api/users/token', {
            method: 'POST',
            body: formData,
          });

          if (response.ok) {
            const data = await response.json();

            // Store token in localStorage
            localStorage.setItem('access_token', data.access_token);

            document.getElementById('successMessage').textContent = 'Login successful!';
            showModalSafe('successModal');

            document.getElementById('successModal').addEventListener('hidden.bs.modal', () => {
              window.location.href = '/';
            }, { once: true });
          } else {
            const error = await response.json();
            document.getElementById('errorMessage').textContent = getErrorSafe(error);
            showModalSafe('errorModal');
          }
        } catch (error) {
          document.getElementById('errorMessage').textContent =
            'Network error. Please check your connection and try again.';
          showModalSafe('errorModal');
        }
      });
    </script>
{% endblock scripts %}
